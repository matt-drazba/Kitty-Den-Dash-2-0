<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=800, initial-scale=1.0" />
  <title>Kitchen Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2e2e2e;
      --text:       #f0f0f0;
      --muted:      #888888;
      --accent:     #4fc3f7;
      --alert-bg:   #1a0a00;
      --alert-col:  #ff6b35;
      --alert-bdr:  #ff6b35;
      --good:       #4caf50;
      --radius:     12px;
      --radius-sm:  8px;
    }

    html, body {
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    #root {
      display: grid;
      grid-template-rows: 72px 1fr 38px;
      grid-template-columns: 1fr;
      height: 480px;
      gap: 0;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #clock {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #topbar-right {
      text-align: right;
    }

    #date-label {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.3;
    }

    #location-label {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Main area ───────────────────────────────────────────── */
    #main {
      display: grid;
      grid-template-columns: 272px 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Weather panel ───────────────────────────────────────── */
    #weather-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #weather-current {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    #weather-icon {
      font-size: 48px;
      line-height: 1;
      margin-top: 2px;
    }

    #weather-temps {
      display: flex;
      flex-direction: column;
    }

    #weather-temp-big {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
    }

    #weather-condition {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }

    #weather-hl {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    #weather-hl span {
      color: var(--text);
      font-weight: 600;
    }

    /* forecast strip */
    #forecast-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      flex: 1;
      align-items: end;
    }

    .forecast-day {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .forecast-day-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .forecast-day-icon {
      font-size: 22px;
      line-height: 1;
    }

    .forecast-day-hl {
      font-size: 11px;
      color: var(--muted);
    }

    .forecast-day-hl strong {
      color: var(--text);
    }

    /* ── Status panel ────────────────────────────────────────── */
    #status-panel {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
    }

    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .tile-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tile-icon {
      font-size: 22px;
      line-height: 1;
    }

    .tile-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .tile-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-top: 6px;
    }

    /* Alert tile state */
    .tile.alert {
      background: var(--alert-bg);
      border-color: var(--alert-bdr);
      animation: pulse-border 1.8s ease-in-out infinite;
    }

    .tile.alert .tile-value {
      color: var(--alert-col);
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
      50%       { box-shadow: 0 0 0 4px rgba(255,107,53,0.25); }
    }

    /* ── Alert strip ─────────────────────────────────────────── */
    #alert-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    #alert-strip.has-alerts {
      background: #1a0800;
      border-top-color: var(--alert-bdr);
    }

    #alert-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--alert-col);
      white-space: nowrap;
      border: 1px solid var(--alert-col);
      padding: 2px 7px;
      border-radius: 4px;
      display: none;
    }

    #alert-strip.has-alerts #alert-badge {
      display: block;
    }

    #alert-ticker-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    #alert-ticker {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    #alert-strip.has-alerts #alert-ticker {
      color: #ffb380;
      animation: ticker-fade 0.4s ease;
    }

    @keyframes ticker-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Separator dot ───────────────────────────────────────── */
    .dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border);
      vertical-align: middle;
      margin: 0 6px;
    }

    /* ── Refresh indicator ───────────────────────────────────── */
    #refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--good);
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity 0.3s;
      margin-left: auto;
    }
    #refresh-dot.flash {
      opacity: 1;
    }
  </style>
</head>
<body>
<div id="root">

  <!-- Top bar -->
  <header id="topbar">
    <div id="clock">--:--</div>
    <div id="topbar-right">
      <div id="date-label">Loading…</div>
      <div id="location-label"></div>
    </div>
  </header>

  <!-- Main -->
  <div id="main">

    <!-- Weather panel -->
    <section id="weather-panel">
      <div id="weather-current">
        <div id="weather-icon">☀️</div>
        <div id="weather-temps">
          <div id="weather-temp-big">--°</div>
          <div id="weather-condition">--</div>
          <div id="weather-hl">H <span id="wh">--</span>° · L <span id="wl">--</span>°</div>
        </div>
      </div>
      <div id="forecast-strip">
        <!-- injected by JS -->
      </div>
    </section>

    <!-- Status tile grid -->
    <section id="status-panel">
      <!-- injected by JS -->
    </section>

  </div>

  <!-- Alert strip -->
  <footer id="alert-strip">
    <span id="alert-badge">Alert</span>
    <div id="alert-ticker-wrap">
      <span id="alert-ticker">All systems normal</span>
    </div>
    <div id="refresh-dot" title="Data refreshed"></div>
  </footer>

</div>

<script>
  /* ─────────────────────────────────────────────────────────────
   * TEST DATA
   * Replace fetchData() below to pull from your real API endpoint.
   * ───────────────────────────────────────────────────────────── */
  const TEST_DATA = {
    weather: {
      location: "Redwood City, CA",
      temp: 68,
      condition: "Sunny",
      high: 72,
      low: 54,
      forecast: [
        { day: "Tue", high: 74, low: 55, condition: "Sunny" },
        { day: "Wed", high: 69, low: 53, condition: "Cloudy" },
        { day: "Thu", high: 63, low: 50, condition: "Rain" }
      ]
    },
    status: {
      laundry:    { label: "Laundry",     icon: "🫧", value: "Done",           alert: true  },
      front_door: { label: "Front Door",  icon: "🔒", value: "Locked",         alert: false },
      garage:     { label: "Garage",      icon: "🏠", value: "Closed",         alert: false },
      thermostat: { label: "Thermostat",  icon: "🌡️", value: "71°F · Cooling", alert: false },
      whos_home:  { label: "Home",        icon: "👨‍👧‍👦", value: "Matt + 2 kids",  alert: false },
      pool:       { label: "Pool",        icon: "🏊", value: "78°F",           alert: false }
    },
    alerts: ["Laundry is done!", "Front door unlocked at 3:42 PM"]
  };

  /* ─────────────────────────────────────────────────────────────
   * DATA FETCH
   * Swap this for:  const res = await fetch('/api/status');
   *                 return res.json();
   * ───────────────────────────────────────────────────────────── */
  async function fetchData() {
    // TODO: replace with real API call
    // const res = await fetch('/api/status');
    // return res.json();
    return TEST_DATA;
  }

  /* ─────────────────────────────────────────────────────────────
   * WEATHER ICONS
   * ───────────────────────────────────────────────────────────── */
  function weatherIcon(condition) {
    const c = (condition || "").toLowerCase();
    if (c.includes("sun") || c.includes("clear"))  return "☀️";
    if (c.includes("cloud"))                        return "⛅";
    if (c.includes("rain") || c.includes("shower")) return "🌧️";
    if (c.includes("snow"))                         return "❄️";
    if (c.includes("storm") || c.includes("thunder")) return "⛈️";
    if (c.includes("fog") || c.includes("mist"))   return "🌫️";
    if (c.includes("wind"))                         return "💨";
    return "🌤️";
  }

  /* ─────────────────────────────────────────────────────────────
   * RENDER
   * ───────────────────────────────────────────────────────────── */
  function renderWeather(w) {
    document.getElementById("weather-icon").textContent       = weatherIcon(w.condition);
    document.getElementById("weather-temp-big").textContent   = w.temp + "°";
    document.getElementById("weather-condition").textContent  = w.condition;
    document.getElementById("wh").textContent = w.high;
    document.getElementById("wl").textContent = w.low;
    document.getElementById("location-label").textContent     = w.location;

    const strip = document.getElementById("forecast-strip");
    strip.innerHTML = w.forecast.map(f => `
      <div class="forecast-day">
        <div class="forecast-day-name">${f.day}</div>
        <div class="forecast-day-icon">${weatherIcon(f.condition)}</div>
        <div class="forecast-day-hl"><strong>${f.high}</strong> / ${f.low}</div>
      </div>
    `).join("");
  }

  function renderStatus(status) {
    const panel = document.getElementById("status-panel");
    panel.innerHTML = Object.values(status).map(tile => `
      <div class="tile${tile.alert ? " alert" : ""}">
        <div class="tile-header">
          <span class="tile-icon">${tile.icon || "●"}</span>
          <span class="tile-label">${tile.label}</span>
        </div>
        <div class="tile-value">${tile.value}</div>
      </div>
    `).join("");
  }

  /* alert ticker */
  let _alertIndex = 0;
  let _alerts = [];

  function renderAlerts(alerts) {
    _alerts = alerts || [];
    const strip  = document.getElementById("alert-strip");
    const ticker = document.getElementById("alert-ticker");

    if (_alerts.length === 0) {
      strip.classList.remove("has-alerts");
      ticker.textContent = "All systems normal";
      return;
    }
    strip.classList.add("has-alerts");
  }

  function tickAlert() {
    if (_alerts.length === 0) return;
    const ticker = document.getElementById("alert-ticker");
    _alertIndex = (_alertIndex + 1) % _alerts.length;
    ticker.style.animation = "none";
    ticker.offsetHeight; // reflow
    ticker.style.animation = "";
    ticker.className = "";
    ticker.textContent = _alerts[_alertIndex];
  }

  /* ─────────────────────────────────────────────────────────────
   * REFRESH
   * ───────────────────────────────────────────────────────────── */
  async function refresh() {
    const data = await fetchData();
    renderWeather(data.weather);
    renderStatus(data.status);
    renderAlerts(data.alerts);

    // First alert shown immediately
    if (data.alerts && data.alerts.length > 0) {
      _alertIndex = 0;
      document.getElementById("alert-ticker").textContent = data.alerts[0];
    }

    // Flash the status dot
    const dot = document.getElementById("refresh-dot");
    dot.classList.add("flash");
    setTimeout(() => dot.classList.remove("flash"), 600);
  }

  /* ─────────────────────────────────────────────────────────────
   * CLOCK
   * ───────────────────────────────────────────────────────────── */
  function updateClock() {
    const now = new Date();

    // Time (12-hour, no seconds on clock to keep it big)
    let h   = now.getHours();
    const m = String(now.getMinutes()).padStart(2, "0");
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    document.getElementById("clock").textContent = `${h}:${m} ${ampm}`;

    // Date
    const days   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById("date-label").textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  }

  /* ─────────────────────────────────────────────────────────────
   * BOOT
   * ───────────────────────────────────────────────────────────── */
  updateClock();
  setInterval(updateClock, 1000);

  refresh();
  setInterval(refresh, 60_000);           // re-render from data every 60s
  setInterval(tickAlert, 5_000);          // cycle alert messages every 5s
</script>
</body>
</html>
